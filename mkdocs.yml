site_name: IT automatiseerimise kursus
site_description: Automatiseerimise praktikad ja tööriistad - versioonihaldusest orkestratsioonini
site_author: Maria Talvik
site_url: https://hkhk-automation.github.io/devops
copyright: Maria Talvik &middot; CC BY-SA 4.0

# Ära ehita arhiivi saiti
exclude_docs: |
  _archive/

# Repository
repo_name: hkhk-automation/devops
repo_url: https://github.com/hkhk-automation/devops
edit_uri: edit/main/docs/

# Theme
theme:
  name: material
  language: et
  features:
  - announce.dismiss
  - content.action.edit
  - content.action.view
  - content.code.annotate
  - content.code.copy
  - content.code.select
  - content.tabs.link
  - content.tooltips
  - header.autohide
  - navigation.expand
  - navigation.footer
  - navigation.indexes
  - navigation.instant
  - navigation.instant.prefetch
  - navigation.instant.progress
  - navigation.prune
  - navigation.sections
  - navigation.top
  - navigation.tracking
  - search.highlight
  - search.share
  - search.suggest
  - toc.follow
  - toc.integrate
  palette:
  - media: "(prefers-color-scheme)"
    scheme: default
    primary: deep purple
    accent: pink
    toggle:
      icon: material/brightness-auto
      name: Vaheta tumele režiimile
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: deep purple
    accent: pink
    toggle:
      icon: material/brightness-7
      name: Vaheta tumele režiimile
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: deep purple
    accent: pink
    toggle:
      icon: material/brightness-4
      name: Vaheta heledasse režiimi
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    logo: material/server-network

# Plugins
plugins:
- search:
    separator: '[\s\u200b\-_,:!=\[\]()`"/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
    lang: en

# Navigation
nav:
- Avaleht: index.md
- Töökeskkond: kodulabor.md

- N1 · Miks automatiseerimine?:
  - Loeng: week01/lecture.md
  - Praktikum: week01/lab.md

- N2 · Muudatuste jälgimine meeskonnas:
  - Praktikum: week02/lab.md
  - Kodutöö: week02/homework.md

- N3 · Serveri konfiguratsiooni automatiseerimine:
  - Loeng: week03/lecture.md
  - Praktikum: week03/lab.md
  - Kodutöö: week03/homework.md

- N4 · Dünaamiline konfiguratsioon ja saladuste kaitse:
  - Loeng: week04/lecture.md
  - Praktikum: week04/lab.md
  - Kodutöö: week04/homework.md

- N5 · Rakenduse pakkimine ja ümberpaigutamine:
  - Loeng: week05/lecture.md
  - Praktikum: week05/lab.md
  - Kodutöö: week05/homework.md

- N6 · Mitme teenuse käitamine koos:
  - Loeng: week06/lecture.md
  - Praktikum: week06/lab.md
  - Kodutöö: week06/homework.md

- N7 · Automaatne testimine ja tarnekonveier:
  - Loeng: week07/lecture.md
  - Praktikum: week07/lab.md
  - Kodutöö: week07/homework.md

- N8 · Automaatne ehitamine ja levitamine:
  - Loeng: week08/lecture.md
  - Praktikum: week08/lab.md
  - Kodutöö: week08/homework.md

- N9 · Infrastruktuur koodina — mõtteviis (ASYNC):
  - Iseseisvtöö: week09/async_task.md

- N10 · Infrastruktuuri kirjeldamine koodina:
  - Loeng: week10/lecture.md
  - Praktikum: week10/lab.md

- N11 · Korduvkasutatav infrastruktuur:
  - Valik 1 — Terraform moodulid: week11/lab_terraform_modules.md
  - Valik 2 — Ansible rollid (loeng): week11/lecture_ansible_roles.md
  - Valik 2 — Ansible rollid (praktikum): week11/lab_ansible_roles.md
  - Valik 2 — Ansible rollid (kodutöö): week11/homework_ansible_roles.md

- N12 · Infrastruktuur koodina — Ansible IaC:
  - Loeng: week12/lecture.md
  - Praktikum: week12/lab.md

- N13 · Täielik tarnekonveier — otsast lõpuni:
  - Capstone: week13/capstone.md

- Litsents: litsents.md

# Markdown extensions
markdown_extensions:
- abbr
- admonition
- attr_list
- def_list
- footnotes
- md_in_html
- tables
- toc:
    permalink: true
    title: Sisukord
    toc_depth: 3
- pymdownx.arithmatex:
    generic: true
- pymdownx.betterem:
    smart_enable: all
- pymdownx.caret
- pymdownx.details
- pymdownx.emoji:
    emoji_generator: !!python/name:material.extensions.emoji.to_svg ""
    emoji_index: !!python/name:material.extensions.emoji.twemoji ""
- pymdownx.highlight:
    anchor_linenums: true
    line_spans: __span
    pygments_lang_class: true
- pymdownx.inlinehilite
- pymdownx.keys
- pymdownx.magiclink:
    normalize_issue_symbols: true
    repo_url_shorthand: true
    user: hkhk-automation
    repo: devops
- pymdownx.mark
- pymdownx.smartsymbols
- pymdownx.snippets:
    auto_append:
    - includes/mkdocs.md
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format ""
- pymdownx.tabbed:
    alternate_style: true
    combine_header_slug: true
    slugify: !!python/object/apply:pymdownx.slugs.slugify
      kwds:
        case: lower
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.tilde


extra_css:
  - stylesheets/extra.css

# Disable last updated date
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.esm.min.mjs

extra:
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/hkhk-automation
