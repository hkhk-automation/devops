<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="have" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8f5e9"/>
      <stop offset="1" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="learn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ede7f6"/>
      <stop offset="1" stop-color="#d1c4e9"/>
    </linearGradient>
    <linearGradient id="goal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3e0"/>
      <stop offset="1" stop-color="#ffe0b2"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7e57c2"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#4527a0">Kus sa praegu oled — ja kuhu see kursus viib</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#666">Sa ei alusta nullist. Sinu CompTIA-tase on vundament.</text>

  <!-- COLUMN 1: JUBA OSKAD -->
  <rect x="30" y="90" width="240" height="380" rx="14" fill="url(#have)" stroke="#66bb6a" stroke-width="2"/>
  <text x="150" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#2e7d32">JUBA OSKAD</text>
  <text x="150" y="140" text-anchor="middle" font-size="11" fill="#558b2f">CompTIA / senine õpe</text>

  <g font-size="13" fill="#1b5e20">
    <rect x="52" y="158" width="196" height="34" rx="8" fill="#fff" stroke="#a5d6a7"/>
    <text x="150" y="180" text-anchor="middle">Linux CLI · käsurida</text>
    <rect x="52" y="200" width="196" height="34" rx="8" fill="#fff" stroke="#a5d6a7"/>
    <text x="150" y="222" text-anchor="middle">SSH · kaugühendus</text>
    <rect x="52" y="242" width="196" height="34" rx="8" fill="#fff" stroke="#a5d6a7"/>
    <text x="150" y="264" text-anchor="middle">Võrgud · TCP/IP · DNS</text>
    <rect x="52" y="284" width="196" height="34" rx="8" fill="#fff" stroke="#a5d6a7"/>
    <text x="150" y="306" text-anchor="middle">Packet Tracer / GNS3</text>
    <rect x="52" y="326" width="196" height="34" rx="8" fill="#fff" stroke="#a5d6a7"/>
    <text x="150" y="348" text-anchor="middle">Serveri haldus käsitsi</text>
    <rect x="52" y="368" width="196" height="34" rx="8" fill="#fff" stroke="#a5d6a7"/>
    <text x="150" y="390" text-anchor="middle">Kasutajad · õigused · sudo</text>
    <rect x="52" y="410" width="196" height="34" rx="8" fill="#fff" stroke="#a5d6a7"/>
    <text x="150" y="432" text-anchor="middle">Failisüsteem · paketid</text>
  </g>

  <!-- COLUMN 2: SEE KURSUS -->
  <rect x="330" y="90" width="240" height="380" rx="14" fill="url(#learn)" stroke="#7e57c2" stroke-width="2"/>
  <text x="450" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#4527a0">SEE KURSUS</text>
  <text x="450" y="140" text-anchor="middle" font-size="11" fill="#5e35b1">käsitsi → koodiks</text>

  <g font-size="13" fill="#311b92">
    <rect x="352" y="158" width="196" height="34" rx="8" fill="#fff" stroke="#b39ddb"/>
    <text x="450" y="180" text-anchor="middle">Git · versioonihaldus</text>
    <rect x="352" y="200" width="196" height="34" rx="8" fill="#fff" stroke="#b39ddb"/>
    <text x="450" y="222" text-anchor="middle">Ansible · server koodiks</text>
    <rect x="352" y="242" width="196" height="34" rx="8" fill="#fff" stroke="#b39ddb"/>
    <text x="450" y="264" text-anchor="middle">Docker · konteinerid</text>
    <rect x="352" y="284" width="196" height="34" rx="8" fill="#fff" stroke="#b39ddb"/>
    <text x="450" y="306" text-anchor="middle">CI/CD · GitHub Actions</text>
    <rect x="352" y="326" width="196" height="34" rx="8" fill="#fff" stroke="#b39ddb"/>
    <text x="450" y="348" text-anchor="middle">Terraform · infra koodiks</text>
    <rect x="352" y="368" width="196" height="34" rx="8" fill="#fff" stroke="#b39ddb"/>
    <text x="450" y="390" text-anchor="middle">IaC · mitu serverit korraga</text>
    <rect x="352" y="410" width="196" height="34" rx="8" fill="#fff" stroke="#b39ddb"/>
    <text x="450" y="432" text-anchor="middle">Capstone · kõik koos</text>
  </g>

  <!-- COLUMN 3: KELLEKS SAAD -->
  <rect x="630" y="90" width="240" height="380" rx="14" fill="url(#goal)" stroke="#ffa726" stroke-width="2"/>
  <text x="750" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#e65100">KELLEKS SAAD</text>
  <text x="750" y="140" text-anchor="middle" font-size="11" fill="#ef6c00">tööturu rollid</text>

  <g font-size="13" fill="#e65100">
    <rect x="652" y="162" width="196" height="46" rx="8" fill="#fff" stroke="#ffcc80"/>
    <text x="750" y="182" text-anchor="middle" font-weight="600">DevOps Junior</text>
    <text x="750" y="199" text-anchor="middle" font-size="10" fill="#f57c00">pipeline'id, automatiseerimine</text>
    <rect x="652" y="216" width="196" height="46" rx="8" fill="#fff" stroke="#ffcc80"/>
    <text x="750" y="236" text-anchor="middle" font-weight="600">Platform / SRE</text>
    <text x="750" y="253" text-anchor="middle" font-size="10" fill="#f57c00">taristu, töökindlus</text>
    <rect x="652" y="270" width="196" height="46" rx="8" fill="#fff" stroke="#ffcc80"/>
    <text x="750" y="290" text-anchor="middle" font-weight="600">Cloud Engineer</text>
    <text x="750" y="307" text-anchor="middle" font-size="10" fill="#f57c00">pilv, IaC</text>
    <rect x="652" y="324" width="196" height="46" rx="8" fill="#fff" stroke="#ffcc80"/>
    <text x="750" y="344" text-anchor="middle" font-weight="600">Automation Engineer</text>
    <text x="750" y="361" text-anchor="middle" font-size="10" fill="#f57c00">Ansible, CI/CD</text>
    <rect x="652" y="378" width="196" height="46" rx="8" fill="#fff" stroke="#ffcc80"/>
    <text x="750" y="398" text-anchor="middle" font-weight="600">Sr. Sysadmin</text>
    <text x="750" y="415" text-anchor="middle" font-size="10" fill="#f57c00">kariloomad, mitte lemmikud</text>
  </g>

  <!-- arrows -->
  <line x1="272" y1="280" x2="326" y2="280" stroke="#7e57c2" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="572" y1="280" x2="626" y2="280" stroke="#7e57c2" stroke-width="3" marker-end="url(#arr)"/>
</svg>
